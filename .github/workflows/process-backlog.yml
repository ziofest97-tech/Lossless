name: Daily PR Backlog Processor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of PRs to process (max 50 at a time)'
        required: true
        default: '30'

jobs:
  wake-prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Wake up old PRs to trigger CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}   # <--- This line fixes the error!
        run: |
          BATCH_SIZE="${{ github.event.inputs.batch_size || '30' }}"
          echo "Fetching up to $BATCH_SIZE oldest open PRs..."
          
          # Fetch oldest open PRs from the backlog
          PRS=$(gh pr list --state open --limit "$BATCH_SIZE" --search "sort:created-asc" --json number -q '.[].number')
          
          if [ -z "$PRS" ]; then
            echo "No open PRs found! The backlog is fully cleared."
            exit 0
          fi
          
          for PR in $PRS; do
            echo "Waking up PR #$PR to trigger validation..."
            # Closing and immediately reopening triggers the 'pull_request_target' workflow
            gh pr close $PR
            gh pr reopen $PR
            
            # Sleep for 5 seconds to prevent hitting GitHub API rate limits
            sleep 5
          done
